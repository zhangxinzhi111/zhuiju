<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a1a">
<title>追剧 - 发现好剧，在线观影</title>
<style>
:root{
--bg:#0a0a1a;--bg2:#111128;--surface:rgba(255,255,255,0.04);
--surface2:rgba(255,255,255,0.08);--border:rgba(255,255,255,0.06);
--text:#eaeaf4;--text2:#8a8aaa;--text3:#5a5a7a;
--pink:#ff6b9d;--pink2:#c44569;--purple:#6c5ce7;--cyan:#00d2ff;
--gold:#f9ca24;--green:#2ed573;--orange:#ff9f43;
--radius:12px;--radius-sm:8px;--radius-xs:5px;
--safe-bottom:env(safe-area-inset-bottom,12px);
--safe-top:env(safe-area-inset-top,0px);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
background:linear-gradient(180deg,#0a0a1a 0%,#111128 50%,#0a0a1a 100%);
color:var(--text);min-height:100dvh;
padding-bottom:calc(56px + var(--safe-bottom));
-webkit-tap-highlight-color:transparent;
-webkit-font-smoothing:antialiased;
overflow-x:hidden;
}
body::before{
content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;
background:radial-gradient(circle at 30% 20%,rgba(108,92,231,0.06) 0%,transparent 50%),
radial-gradient(circle at 70% 60%,rgba(255,107,157,0.05) 0%,transparent 50%),
radial-gradient(circle at 50% 80%,rgba(0,210,255,0.04) 0%,transparent 50%);
pointer-events:none;z-index:0;
}

/* ===== HEADER ===== */
.header{
position:sticky;top:0;z-index:100;padding:calc(var(--safe-top) + 6px) 10px 6px;
background:linear-gradient(180deg,var(--bg) 70%,transparent);
backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.logo{
font-size:20px;font-weight:900;letter-spacing:2px;
background:linear-gradient(135deg,var(--pink),var(--purple),var(--cyan));
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
background-clip:text;
}
.logo-sub{font-size:10px;color:var(--text3);margin-left:3px;font-weight:400;}
.stats-row{display:flex;gap:8px;align-items:center;}
.stat-badge{
font-size:10px;padding:2px 8px;border-radius:20px;
background:var(--surface2);color:var(--text2);white-space:nowrap;
display:flex;align-items:center;gap:4px;
}
.stat-badge .dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.search-box{display:flex;gap:6px;}
.search-input{
flex:1;height:34px;border-radius:17px;border:1.5px solid var(--border);
background:var(--surface);color:var(--text);padding:0 14px;font-size:13px;outline:none;
transition:all 0.3s;
}
.search-input:focus{border-color:var(--purple);background:rgba(108,92,231,0.08);box-shadow:0 0 16px rgba(108,92,231,0.1);}
.search-input::placeholder{color:var(--text3);}
.search-btn{
height:34px;padding:0 16px;border-radius:17px;border:none;
background:linear-gradient(135deg,var(--pink),var(--purple));
color:#fff;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;
box-shadow:0 3px 12px rgba(108,92,231,0.3);
transition:transform 0.2s;
}
.search-btn:active{transform:scale(0.95);}

/* ===== CONTENT ===== */
.content{padding:0 6px 8px;position:relative;z-index:1;}
.page{display:none;animation:fadeIn 0.25s ease;}
.page.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ===== BANNER ===== */
.banner-wrap{margin:0 -2px 10px;position:relative;}
.banner-scroll{
display:flex;gap:6px;overflow-x:auto;scroll-snap-type:x mandatory;
-webkit-overflow-scrolling:touch;padding:0 2px 4px;
scrollbar-width:none;scroll-behavior:smooth;
}
.banner-scroll::-webkit-scrollbar{display:none;}
.banner-card{
flex:0 0 70vw;max-width:280px;height:140px;border-radius:var(--radius);
overflow:hidden;position:relative;scroll-snap-align:start;
cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 16px rgba(0,0,0,0.3);
}
.banner-card:active{transform:scale(0.97);}
.banner-card img{width:100%;height:100%;object-fit:cover;}
.banner-card .banner-bg{
width:100%;height:100%;position:absolute;inset:0;
background:linear-gradient(135deg,var(--purple),var(--pink2),var(--cyan));
display:flex;align-items:center;justify-content:center;font-size:36px;
}
.banner-overlay{
position:absolute;inset:0;
background:linear-gradient(0deg,rgba(10,10,26,0.95) 0%,rgba(10,10,26,0.25) 40%,transparent 70%);
}
.banner-info{
position:absolute;bottom:8px;left:10px;right:10px;z-index:2;
}
.banner-info .banner-title{font-size:14px;font-weight:800;margin-bottom:2px;text-shadow:0 2px 6px rgba(0,0,0,0.6);}
.banner-info .banner-meta{font-size:9px;color:rgba(255,255,255,0.75);display:flex;gap:4px;align-items:center;flex-wrap:wrap;}
.banner-tag{padding:1px 5px;border-radius:6px;background:rgba(255,107,157,0.7);font-size:8px;color:#fff;}
.banner-dots{
display:flex;justify-content:center;gap:5px;margin-top:6px;
}
.banner-dot{
width:5px;height:5px;border-radius:50%;background:var(--text3);
transition:all 0.3s;
}
.banner-dot.active{background:var(--pink);width:16px;border-radius:3px;}

/* ===== CATEGORY BAR ===== */
.cat-bar{
display:flex;gap:5px;overflow-x:auto;padding:2px 0 8px;
scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
.cat-bar::-webkit-scrollbar{display:none;}
.cat-btn{
flex:0 0 auto;height:26px;padding:0 12px;border-radius:13px;
border:1px solid var(--border);background:var(--surface);
color:var(--text2);font-size:11px;cursor:pointer;white-space:nowrap;
transition:all 0.25s;font-weight:500;
}
.cat-btn.active{
background:linear-gradient(135deg,var(--pink),var(--purple));
border-color:transparent;color:#fff;font-weight:700;
box-shadow:0 3px 10px rgba(108,92,231,0.25);
}
.sort-btn{
flex:0 0 auto;height:22px;padding:0 10px;border-radius:11px;
border:1px solid var(--border);background:var(--surface);
color:var(--text2);font-size:10px;cursor:pointer;white-space:nowrap;
transition:all 0.25s;font-weight:500;
}
.sort-btn.active{
background:var(--surface2);border-color:var(--gold);color:var(--gold);font-weight:700;
}

/* ===== SECTION ===== */
.section-header{
display:flex;align-items:center;justify-content:space-between;
margin:0 2px 6px;
}
.section-title{font-size:14px;font-weight:800;display:flex;align-items:center;gap:4px;}
.section-title .icon{font-size:15px;}
.section-count{font-size:10px;color:var(--text3);}

/* ===== COMPACT GRID - 更紧凑的布局 ===== */
.movie-grid{
display:grid;grid-template-columns:repeat(auto-fill, minmax(105px, 1fr));
gap:6px;
}

/* ===== MOVIE CARD - 更精致 ===== */
.movie-card{
border-radius:var(--radius);overflow:hidden;background:var(--surface);
border:1px solid var(--border);cursor:pointer;
transition:transform 0.15s,box-shadow 0.15s;
position:relative;
}
.movie-card:hover{box-shadow:0 4px 16px rgba(108,92,231,0.12);}
.movie-card:active{transform:scale(0.97);}
.movie-card .card-poster{
width:100%;aspect-ratio:2/3;position:relative;overflow:hidden;
background:linear-gradient(135deg,#1a1a3e,#2a1a3e);
}
.movie-card .card-poster img{
width:100%;height:100%;object-fit:cover;
display:block;
}
.movie-card .card-poster img.hidden{display:none;}
.movie-card .card-poster .poster-fallback{
position:absolute;inset:0;
background:linear-gradient(135deg,var(--c1,#1a1a3e),var(--c2,#2a1a3e));
display:flex;align-items:center;justify-content:center;flex-direction:column;
}
.poster-fallback .pf-icon{font-size:28px;opacity:0.7;margin-bottom:2px;}
.poster-fallback .pf-title{
font-size:10px;font-weight:700;color:rgba(255,255,255,0.8);text-align:center;
padding:0 4px;line-height:1.3;max-width:90%;
display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.poster-fallback .pf-pattern{
position:absolute;inset:0;opacity:0.06;
background:repeating-linear-gradient(45deg,transparent,transparent 6px,rgba(255,255,255,0.1) 6px,rgba(255,255,255,0.1) 8px);
}
.card-poster .poster-gradient{
position:absolute;bottom:0;left:0;right:0;height:35%;
background:linear-gradient(0deg,rgba(10,10,26,0.85),transparent);
z-index:2;pointer-events:none;
}
.card-poster .poster-label{
position:absolute;bottom:4px;left:4px;right:4px;z-index:3;
font-size:9px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,0.7);
line-height:1.2;max-height:2.4em;overflow:hidden;
display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
}
.card-fav{
position:absolute;top:3px;right:3px;z-index:5;
width:24px;height:24px;border-radius:50%;
background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);
border:none;display:flex;align-items:center;justify-content:center;
cursor:pointer;font-size:12px;transition:all 0.2s;padding:0;
}
.card-fav.active{background:var(--pink);}
.movie-card .card-body{padding:5px 6px 6px;}
.card-body .card-title{
font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;
text-overflow:ellipsis;margin-bottom:2px;line-height:1.3;
}
.card-body .card-tags{display:flex;gap:2px;flex-wrap:wrap;}
.card-body .card-tags .tag{
font-size:8px;padding:1px 5px;border-radius:5px;
background:var(--surface2);color:var(--text2);
}
.card-body .card-tags .tag.hot{
background:rgba(255,107,157,0.12);color:var(--pink);
}

/* ===== TMDB RATING ===== */
.tmdb-rating{
position:absolute;top:3px;left:3px;z-index:5;
font-size:9px;font-weight:800;color:#f9ca24;
background:rgba(0,0,0,0.65);backdrop-filter:blur(3px);
padding:1px 5px;border-radius:5px;
display:flex;align-items:center;gap:1px;
}

/* ===== DETAIL SHEET ===== */
.sheet-overlay{
position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.6);
backdrop-filter:blur(4px);display:none;align-items:flex-end;
animation:fadeIn 0.2s ease;
}
.sheet-overlay.show{display:flex;}
.sheet{
width:100%;max-height:80vh;background:var(--bg2);
border-radius:16px 16px 0 0;overflow-y:auto;
animation:slideUp 0.3s cubic-bezier(0.16,1,0.3,1);
-webkit-overflow-scrolling:touch;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-poster{
width:100%;height:180px;position:relative;overflow:hidden;
background:linear-gradient(135deg,#1a1a3e,#2a1a3e);
display:flex;align-items:center;justify-content:center;
}
.sheet-poster img{width:100%;height:100%;object-fit:cover;}
.sheet-poster .sheet-fallback{font-size:50px;opacity:0.5;}
.sheet-close{
position:absolute;top:10px;right:10px;z-index:5;
width:28px;height:28px;border-radius:50%;
background:rgba(0,0,0,0.4);backdrop-filter:blur(6px);
border:none;color:#fff;font-size:14px;cursor:pointer;
display:flex;align-items:center;justify-content:center;
}
.sheet-body{padding:12px 16px;}
.sheet-body h2{font-size:17px;font-weight:800;margin-bottom:6px;}
.sheet-meta{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;}
.sheet-meta .tag{
font-size:10px;padding:2px 8px;border-radius:8px;
background:var(--surface2);color:var(--text2);
}
.sheet-meta .tag.type{background:rgba(108,92,231,0.15);color:var(--purple);}
.sheet-desc{
font-size:11px;color:var(--text2);line-height:1.6;margin-bottom:12px;
display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;
}
.sheet-desc.expanded{-webkit-line-clamp:unset;}
.sheet-actions{display:flex;gap:8px;padding-bottom:var(--safe-bottom);}
.sheet-btn{
flex:1;height:40px;border-radius:20px;border:none;font-size:13px;font-weight:700;
cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;
transition:transform 0.2s;
}
.sheet-btn:active{transform:scale(0.96);}
.sheet-btn-play{
background:linear-gradient(135deg,var(--pink),var(--purple));
color:#fff;box-shadow:0 3px 14px rgba(108,92,231,0.35);
}
.sheet-btn-fav{
background:var(--surface);color:var(--text2);border:1px solid var(--border);
}
.sheet-btn-fav.active{color:var(--pink);border-color:var(--pink);}

/* ===== PLAYER ===== */
.player-page{
position:fixed;inset:0;z-index:300;background:#000;
display:none;flex-direction:column;
}
.player-page.show{display:flex;}
.player-header{
display:flex;align-items:center;padding:6px 10px;gap:6px;
background:rgba(0,0,0,0.85);z-index:10;flex-shrink:0;
}
.player-header .back-btn{
width:28px;height:28px;border-radius:50%;border:none;
background:rgba(255,255,255,0.15);color:#fff;font-size:14px;
cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.player-title{flex:1;font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.player-container{flex:1;background:#000;display:flex;align-items:center;justify-content:center;min-height:0;position:relative;}
.player-container video{width:100%;height:100%;max-height:100%;object-fit:contain;}
.player-container iframe{width:100%;height:100%;border:none;}
.player-placeholder{text-align:center;color:var(--text2);padding:20px;}

.player-mode-toggle{
position:absolute;top:8px;right:8px;z-index:20;
display:flex;gap:4px;
}
.player-mode-btn{
height:24px;padding:0 8px;border-radius:12px;border:1px solid rgba(255,255,255,0.25);
background:rgba(0,0,0,0.5);color:rgba(255,255,255,0.8);font-size:10px;
cursor:pointer;backdrop-filter:blur(4px);transition:all 0.2s;
}
.player-mode-btn.active{background:rgba(108,92,231,0.6);border-color:var(--purple);color:#fff;}

.source-select{
padding:6px 10px;background:var(--bg2);display:flex;gap:4px;
overflow-x:auto;scrollbar-width:none;border-top:1px solid var(--border);flex-shrink:0;
}
.source-select::-webkit-scrollbar{display:none;}
.source-btn{
flex-shrink:0;height:26px;padding:0 10px;border-radius:13px;
border:1px solid var(--border);background:var(--surface);
color:var(--text2);font-size:10px;cursor:pointer;transition:all 0.2s;
}
.source-btn.active{background:rgba(108,92,231,0.2);border-color:var(--purple);color:var(--purple);}

.episode-toggle{
display:flex;align-items:center;justify-content:center;gap:4px;
padding:6px 10px;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0;
cursor:pointer;font-size:11px;color:var(--text2);user-select:none;
}
.episode-toggle .arrow{transition:transform 0.3s;font-size:10px;}
.episode-toggle .arrow.open{transform:rotate(180deg);}

.episode-bar{
padding:8px 10px;background:var(--bg2);overflow-y:auto;max-height:120px;
display:flex;flex-wrap:wrap;gap:4px;align-content:flex-start;
scrollbar-width:thin;flex-shrink:0;
padding-bottom:calc(8px + var(--safe-bottom));
}
.episode-bar.hidden{display:none;}
.episode-bar::-webkit-scrollbar{width:3px;}
.episode-bar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.episode-btn{
flex:0 0 auto;min-width:38px;height:26px;border-radius:6px;
border:1px solid var(--border);background:var(--surface);
color:var(--text2);font-size:10px;cursor:pointer;
display:flex;align-items:center;justify-content:center;
transition:all 0.2s;padding:0 6px;
}
.episode-btn.active{background:var(--purple);border-color:var(--purple);color:#fff;font-weight:700;}
.episode-btn.watched{border-color:rgba(46,213,115,0.4);background:rgba(46,213,115,0.06);}
.episode-btn.watched::after{content:' ✓';font-size:8px;color:var(--green);margin-left:2px;}
.episode-btn.active.watched::after{color:#fff;}

/* ===== BOTTOM NAV ===== */
.bottom-nav{
position:fixed;bottom:0;left:0;right:0;z-index:100;
background:rgba(10,10,26,0.88);backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
border-top:1px solid var(--border);
display:flex;padding-bottom:var(--safe-bottom);
}
.nav-item{
flex:1;display:flex;flex-direction:column;align-items:center;
justify-content:center;padding:4px 0;gap:1px;
border:none;background:none;color:var(--text3);font-size:9px;
cursor:pointer;transition:color 0.2s;
}
.nav-item svg{width:18px;height:18px;opacity:0.5;transition:all 0.2s;}
.nav-item.active{color:var(--pink);}
.nav-item.active svg{opacity:1;filter:drop-shadow(0 1px 4px rgba(255,107,157,0.3));}

/* ===== PULL REFRESH ===== */
.pull-indicator{
text-align:center;padding:0;color:var(--text3);font-size:11px;
max-height:0;overflow:hidden;transition:max-height 0.3s;
}
.pull-indicator.show{max-height:36px;padding:6px;}
.pull-spinner{
display:inline-block;width:16px;height:16px;border:2px solid var(--border);
border-top-color:var(--pink);border-radius:50%;
animation:spin 0.7s linear infinite;margin-right:4px;vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== EMPTY / STATUS ===== */
.empty-state{text-align:center;padding:40px 20px;color:var(--text3);}
.empty-state .icon{font-size:40px;margin-bottom:10px;opacity:0.6;}
.empty-state p{font-size:12px;line-height:1.6;}
.status-bar{text-align:center;padding:14px;color:var(--text3);font-size:11px;}
.status-bar.error{color:var(--pink);}
.fav-actions{display:flex;justify-content:flex-end;margin-bottom:6px;}
.btn-text{background:none;border:none;color:var(--pink);font-size:11px;cursor:pointer;padding:3px 6px;}

/* ===== SKELETON ===== */
.skeleton{
background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);
background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius-sm);
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skeleton-card{height:180px;border-radius:var(--radius);overflow:hidden;}
.skeleton-card .sk-poster{height:65%;}
.skeleton-card .sk-body{padding:8px;}
.skeleton-card .sk-line{height:8px;margin-bottom:4px;border-radius:4px;}
.skeleton-card .sk-line.short{width:60%;}

/* ===== TOAST ===== */
.toast{
position:fixed;top:50px;left:50%;transform:translateX(-50%);z-index:500;
background:var(--purple);color:#fff;padding:7px 18px;border-radius:18px;
font-size:12px;font-weight:600;box-shadow:0 3px 16px rgba(108,92,231,0.4);
animation:toastIn 0.3s ease,toastOut 0.3s ease 1.8s forwards;
pointer-events:none;
}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
<div class="header-top">
<div class="logo">追剧<span class="logo-sub">v17</span></div>
<div class="stats-row">
<span class="stat-badge"><span class="dot"></span><span id="updateCount">加载中</span></span>
</div>
</div>
<div class="search-box">
<input class="search-input" id="searchInput" type="text" placeholder="输入片名搜索..."
onkeydown="if(event.key==='Enter')doSearch()">
<button class="search-btn" onclick="doSearch()">搜索</button>
</div>
</div>

<!-- Pull Refresh -->
<div class="pull-indicator" id="pullIndicator"></div>

<!-- Content -->
<div class="content">

<!-- 观影页 -->
<div class="page active" id="page-watch">
<div class="banner-wrap">
<div class="banner-scroll" id="bannerScroll"></div>
<div class="banner-dots" id="bannerDots"></div>
</div>
<div class="cat-bar" id="catBar"></div>
<div class="section-header">
<div class="section-title"><span class="icon">🎬</span>热播推荐</div>
<div class="section-count" id="sectionCount"></div>
</div>
<div class="movie-grid" id="movieGrid"></div>
<div class="status-bar" id="hotStatus"></div>
</div>

<!-- 搜索页 -->
<div class="page" id="page-search">
<div class="section-header">
<div class="section-title"><span class="icon">🔍</span>搜索 "<span id="searchQuery"></span>"</div>
</div>
<div class="movie-grid" id="searchResults"></div>
<div class="status-bar" id="searchStatus"></div>

// ============ TMDB API ============
function tmdbEnabled() {
  return TMDB_API_KEY && TMDB_API_KEY !== 'YOUR_TMDB_API_KEY_HERE' && TMDB_API_KEY.length > 10;
}

async function searchTMDB(query) {
  if (!tmdbEnabled()) return null;
  if (tmdbCache[query]) return tmdbCache[query];
  
  // Try multiple CORS proxies for TMDB API
  for (const proxy of CORS_PROXIES) {
    try {
      const tmdbUrl = TMDB_BASE + '/search/multi?api_key=' + TMDB_API_KEY + '&language=zh-CN&query=' + encodeURIComponent(query) + '&page=1';
      const resp = await fetch(proxy + tmdbUrl, { signal: AbortSignal.timeout(10000) });
      if (!resp.ok) continue;
      const data = await resp.json();
      if (!data.results || data.results.length === 0) return null;
      
      let best = null;
      for (const r of data.results) {
        if (r.media_type === 'movie' || r.media_type === 'tv') { best = r; break; }
      }
      if (!best) best = data.results[0];
      
      // Try multiple image CDN proxies for poster
      let poster = null;
      if (best.poster_path) {
        const posterPath = TMDB_IMAGE_BASE + TMDB_POSTER_SIZE + best.poster_path;
        // First try direct (might work on some networks)
        try {
          const testResp = await fetch(posterPath, { method: 'HEAD', signal: AbortSignal.timeout(3000) });
          if (testResp.ok) poster = posterPath;
        } catch(e) {}
        // If direct failed, try proxies
        if (!poster) {
          for (const imgProxy of IMAGE_PROXIES.slice(1)) {
            try {
              const testResp = await fetch(imgProxy + encodeURIComponent(posterPath), { method: 'HEAD', signal: AbortSignal.timeout(3000) });
              if (testResp.ok) { poster = imgProxy + encodeURIComponent(posterPath); break; }
            } catch(e) {}
          }
        }
      }
      
      const result = {
        poster: poster,
        rating: best.vote_average ? best.vote_average.toFixed(1) : null,
        year: (best.release_date || best.first_air_date || '').substring(0, 4),
        overview: best.overview || '',
        title: best.title || best.name || ''
      };
      tmdbCache[query] = result;
      return result;
    } catch(e) { continue; }
  }
  return null;
}

async function batchTMDB(movies) {
  if (!tmdbEnabled()) return;
  const batch = movies.slice(0, 15);
  const promises = batch.map(m => searchTMDB(m.vod_name));
  await Promise.allSettled(promises);
}

const POSTER_COLORS = [
  ['#6c5ce7','#a29bfe'],['#00d2ff','#0097e6'],

function posterColor(name) {
  let h = 0; for(let i=0;i<(name||'').length;i++){h=((h<<5)-h)+(name.charCodeAt(i)||0);h|=0;}
  return POSTER_COLORS[Math.abs(h) % POSTER_COLORS.length];
}

function posterIcon(name) {
  // Map category to icon
  const t = (name || '').toLowerCase();
  if (t.includes('电影')||t.includes('动作')||t.includes('科幻')) return '🎬';
  if (t.includes('电视')||t.includes('剧')||t.includes('drama')) return '📺';
  if (t.includes('动漫')||t.includes('动画')) return '🐾';
  if (t.includes('综艺')) return '🎤';
  return '🎬';
}

// ============ POSTER URL - 核心改进：多代理尝试 ============
function getPosterURL(item) {
  const cacheKey = 'poster_' + item.vod_id;
  if (posterCache[cacheKey]) return posterCache[cacheKey];
  
  // 1. TMDB poster
  if (tmdbEnabled()) {
    const tmdb = tmdbCache[item.vod_name];
    if (tmdb && tmdb.poster) {
      posterCache[cacheKey] = tmdb.poster;
      return tmdb.poster;
    }
  }
  
  // 2. API vod_pic - try direct first (most reliable, no proxy overhead)
  //    then fall back to CORS proxy if direct doesn't work
  if (item.vod_pic && item.vod_pic.startsWith('http')) {
    posterCache[cacheKey] = item.vod_pic;
    return item.vod_pic;
  }
  
  return null;
}

function getRating(item) {
  if (tmdbEnabled()) {
    const tmdb = tmdbCache[item.vod_name];
    if (tmdb && tmdb.rating) return tmdb.rating;
  }
  return null;
}

function escapeHTML(s) {

// ============ API ============
function buildApiUrl(ac, params) {
  if (USE_LOCAL_API) {
    // Local server mode: /api/list?ac=list&pg=1&wd=xxx
    let url = API_BASE + ac;
    let qs = [];
    if (params.wd) qs.push('wd=' + encodeURIComponent(params.wd));
    if (params.ids) qs.push('ids=' + encodeURIComponent(params.ids));
    if (params.t) qs.push('t=' + params.t);
    if (params.pg) qs.push('pg=' + params.pg);
    if (qs.length) url += '?' + qs.join('&');
    return url;
  }
  // CORS proxy mode
  let url = API_BASE + '?ac=' + ac;
  if (params.wd) url += '&wd=' + encodeURIComponent(params.wd);
  if (params.ids) url += '&ids=' + encodeURIComponent(params.ids);
  if (params.t) url += '&t=' + params.t;
  if (params.pg) url += '&pg=' + params.pg;
  return url;
}

async function apiCall(params) {
  const ac = params.ac || 'list';
  
  // Local server mode: direct request, no CORS proxy needed
  if (USE_LOCAL_API) {
    const directUrl = buildApiUrl(ac, params);
    return await fetchAndParse(directUrl, ac);
  }
  
  // Build multiple API+proxy combinations
  const proxies = [
    'https://api.codetabs.com/v1/proxy?quest=',
    'https://api.allorigins.win/raw?url='
  ];
  
  // Primary API with both proxies
  const primaryUrl = buildApiUrlFromBase(API_SOURCES[0], ac, params);
  const url1 = proxies[0] + encodeURIComponent(primaryUrl);
  const url2 = proxies[1] + encodeURIComponent(primaryUrl);
  
  // Race: whichever proxy succeeds first wins
  // Use a custom race that ignores rejections until all fail
  return new Promise((resolve, reject) => {
    let done = false;
    let failCount = 0;
    const total = 2;
    
    const tryUrl = (url) => {
      fetchAndParse(url, ac).then(result => {
        if (!done) { done = true; resolve(result); }
      }).catch(err => {
        failCount++;
        if (!done && failCount >= total) {
          // Both proxies failed, try backup API with codetabs
          const backupUrl = buildApiUrlFromBase(API_SOURCES[1] || API_SOURCES[0], ac, params);
          fetchAndParse(proxies[0] + encodeURIComponent(backupUrl), ac)
            .then(r => { if (!done) { done = true; resolve(r); }})
            .catch(() => reject(new Error('网络请求失败，请下拉刷新重试')));
        }
      });
    };
    
    tryUrl(url1);
    // Stagger the second request by 300ms to avoid hitting rate limits
    setTimeout(() => { if (!done) tryUrl(url2); }, 300);
  });
}

function buildApiUrlFromBase(base, ac, params) {
  let url = base + '?ac=' + ac;
  if (params.wd) url += '&wd=' + encodeURIComponent(params.wd);
  if (params.ids) url += '&ids=' + encodeURIComponent(params.ids);
  if (params.t) url += '&t=' + params.t;
  if (params.pg) url += '&pg=' + params.pg;
  return url;
}

async function fetchAndParse(url, ac) {
  const res = await fetch(url, { signal: AbortSignal.timeout(12000) });
  if (!res.ok) throw new Error('HTTP '+res.status);
  const text = await res.text();
  let data;
  try { data = JSON.parse(text); } catch(e) {
    if (ac === 'detail') throw new Error('详情解析失败');
    const list = parseXMLVod(text);
    if (list.length) return { list, total: list.length };
    throw new Error('API 返回格式异常');
  }
  // API returns code=1 for success
  if (ac === 'detail') {
    const item = data.list ? data.list[0] : data;
    if (!item || !item.vod_id) throw new Error('详情数据为空');
    return {
      vod_id: item.vod_id, vod_name: item.vod_name || item.title,
      vod_pic: item.vod_pic || item.pic || '',
      vod_remarks: item.vod_remarks || '', vod_play_url: item.vod_play_url || '',
      vod_play_from: item.vod_play_from || '', type_name: item.type_name || item.type || '',
      vod_actor: item.vod_actor || '', vod_director: item.vod_director || '',
      vod_blurb: item.vod_blurb || '', vod_content: item.vod_content || '',
      vod_year: item.vod_year || '', vod_area: item.vod_area || ''
    };
  }
  const list = (data.list || data.data || []).map(item => ({
    vod_id: item.vod_id, vod_name: item.vod_name || item.title,
    vod_pic: item.vod_pic || item.pic || '', vod_remarks: item.vod_remarks || '',
    vod_play_url: item.vod_play_url || '', vod_play_from: item.vod_play_from || '',
    type_name: item.type_name || item.type || ''
  }));
  return { list, total: data.total || list.length };
}

function parseXMLVod(xml) {
  const items = [];
  const re = /<vod>([\s\S]*?)<\/vod>/g; let m;
  while ((m = re.exec(xml)) !== null) {
    const b = m[1];
    const g = t => { const r = b.match(new RegExp('<'+t+'>(?:<!\\[CDATA\\[)?([\\s\\S]*?)(?:\\]\\]>)?<\\/'+t+'>')); return r ? r[1].trim() : ''; };
    items.push({ vod_id:g('vod_id'), vod_name:g('vod_name'), vod_pic:g('vod_pic'),
      vod_remarks:g('vod_remarks'), vod_play_url:g('vod_play_url'),
      vod_play_from:g('vod_play_from'), type_name:g('type_name') });
  }
  return items;
}

async function loadAllData() {
  const results = [];
  for (let pg = 1; pg <= 3; pg++) {
    try {
      const result = await apiCall({ pg: pg });
      if (result.list && result.list.length > 0) {
        results.push(...result.list);
      }
      if (!result.list || result.list.length < 20) break;
    } catch(e) { break; }
  }
  const seen = new Set();
  return results.filter(m => {
    if (seen.has(m.vod_id)) return false;
    seen.add(m.vod_id);
    return true;
  });
}

async function fetchDetail(vodId) { return apiCall({ ac: 'detail', ids: vodId }); }

function parsePlayUrls(playUrl, playFrom) {
  if (!playUrl) return [];
  const sources = playUrl.split('$$$');
  const names = playFrom ? playFrom.split('$$$') : [];
  const result = [];
  sources.forEach((src, si) => {
    const name = names[si] || '线路'+(si+1);
    const eps = [];
    src.split('#').forEach(part => {
      const sep = part.lastIndexOf('$');
      if (sep > 0) { const label = part.substring(0,sep).trim(), url = part.substring(sep+1).trim(); if(url) eps.push({label,url}); }
    });
    if (eps.length) result.push({name, eps});
  });
  return result;
}

function getCache() {

    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const cache = JSON.parse(raw);
    if (Date.now() - cache.cachedAt > CACHE_TTL) return null;
    return cache;
  } catch(e) { return null; }
}

function setCache(data) {
  localStorage.setItem(CACHE_KEY, JSON.stringify({ data, cachedAt: Date.now() }));
}

// ============ RENDER: BANNER ============
let bannerScrollListener = null;

function renderBanner(items) {
  const scroll = document.getElementById('bannerScroll');
  const dots = document.getElementById('bannerDots');
  bannerItems = items.slice(0, 6);
  bannerIdx = 0;

  if (bannerTimer) { clearInterval(bannerTimer); bannerTimer = null; }
  if (bannerScrollListener) { scroll.removeEventListener('scroll', bannerScrollListener); }

  scroll.innerHTML = bannerItems.map((item, i) => {
    const c = posterColor(item.vod_name);
    const pic = getPosterURL(item);
    const icon = posterIcon(item.type_name || '');
    const nameSafe = escapeHTML(item.vod_name).replace(/'/g, "\\'");
    return '<div class="banner-card" onclick="openSheet('+item.vod_id+',\''+nameSafe+'\')">'+
      (pic ? '<img src="'+pic+'" loading="eager" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' : '')+
      '<div class="banner-bg" style="'+(pic?'display:none':'')+'background:linear-gradient(135deg,'+c[0]+','+c[1]+')">'+ icon +'</div>'+
      '<div class="banner-overlay"></div>'+
      '<div class="banner-info">'+
      '<div class="banner-title">'+escapeHTML(item.vod_name)+'</div>'+
      '<div class="banner-meta">'+
      (item.type_name?'<span class="banner-tag">'+escapeHTML(item.type_name)+'</span>':'')+
      (item.vod_remarks?'<span>'+escapeHTML(item.vod_remarks)+'</span>':'')+
      '</div></div></div>';
  }).join('');

  dots.innerHTML = bannerItems.map((_,i) => '<div class="banner-dot'+(i===0?' active':'')+'" onclick="scrollBanner('+i+')"></div>').join('');

  bannerTimer = setInterval(() => {
    if (bannerItems.length === 0) return;
    bannerIdx = (bannerIdx + 1) % bannerItems.length;
    autoScrollBanner(bannerIdx);
  }, 3500);

  bannerScrollListener = () => {
    const cards = scroll.querySelectorAll('.banner-card');
    if (!cards.length) return;
    const w = cards[0].offsetWidth + 6;
    const idx = Math.round(scroll.scrollLeft / w);
    if (idx >= 0 && idx < bannerItems.length && idx !== bannerIdx) {
      bannerIdx = idx;
      updateBannerDots();
    }
  };
  scroll.addEventListener('scroll', bannerScrollListener, { passive: true });
}

function autoScrollBanner(idx) {
  const scroll = document.getElementById('bannerScroll');
  if (!scroll) return;
  const cards = scroll.querySelectorAll('.banner-card');
  if (!cards.length) return;
  const targetScroll = idx * (cards[0].offsetWidth + 6);
  scroll.scrollTo({ left: targetScroll, behavior: 'smooth' });
  bannerIdx = idx;
  updateBannerDots();

// ============ CATEGORY MATCHING ============
function matchCategory(typeName, cat) {
  const t = (typeName || '').toLowerCase();
  if (cat === '电影') {
    if (t.includes('电影') || t.includes('movie')) return true;
    const movieKeywords = ['动作', '喜剧', '爱情', '科幻', '恐怖', '悬疑', '惊悚', '战争',
      '剧情', '犯罪', '冒险', '奇幻', '纪录', '历史', '西部', '歌舞', '音乐',
      '动画片', '文艺', '伦理', '短片', '微电影'];
    return movieKeywords.some(kw => t.includes(kw));
  }
  if (cat === '电视剧') {
    if (t.includes('电视') || t.includes('剧') || t.includes('tv') || t.includes('drama')) return true;
    const tvKeywords = ['国产剧', '港剧', '台剧', '韩剧', '日剧', '美剧', '英剧',
      '泰剧', '海外剧', '网剧', '连续剧', '短剧'];
    return tvKeywords.some(kw => t.includes(kw));
  }
  if (cat === '动漫') {
    if (t.includes('动漫') || t.includes('动画') || t.includes('anime')) return true;
    const animeKeywords = ['日漫', '国漫', '剧场版', 'OVA', 'OAD'];
    return animeKeywords.some(kw => t.includes(kw));
  }
  if (cat === '综艺') {
    if (t.includes('综艺') || t.includes('variety') || t.includes('真人秀')) return true;
    const varietyKeywords = ['脱口秀', '访谈', '选秀', '竞技', '美食', '旅行', '音乐节'];
    return varietyKeywords.some(kw => t.includes(kw));
  }
  return true;
}

    '</div>'+

function renderSkeletons(count) {
  let h = '';
  for (let i = 0; i < count; i++) h += '<div class="skeleton-card"><div class="skeleton sk-poster"></div><div class="sk-body"><div class="skeleton sk-line"></div><div class="skeleton sk-line short"></div></div></div>';
  return h;
}

function getFilteredMovies() {
  let list;
  if (currentCategory === '全部') list = allMovies.slice();
  else list = allMovies.filter(m => matchCategory(m.type_name, currentCategory));
  if (sortMode === 'new') {
    list.sort((a, b) => {
      const ya = extractYear(a), yb = extractYear(b);
      return yb - ya;
    });
  }
  return list;
}

function extractYear(item) {
  if (item.vod_remarks) {
    const m = item.vod_remarks.match(/(\d{4})/);
    if (m) return parseInt(m[1]);
  }
  const combined = (item.vod_name + ' ' + (item.type_name || '') + ' ' + (item.vod_remarks || ''));
  const m = combined.match(/(\d{4})/);
  if (m) return parseInt(m[1]);
  return 0;
}

function renderMovieGrid() {
  const filtered = getFilteredMovies();
  document.getElementById('movieGrid').innerHTML = filtered.map(renderMovieCard).join('');
  document.getElementById('sectionCount').textContent = '共 '+filtered.length+' 部';
}

async function openSheet(vodId, vodName) {
  const overlay = document.getElementById('sheetOverlay');
  overlay.classList.add('show');

  document.getElementById('sheetMeta').innerHTML = '<span class="tag">加载中...</span>';
  document.getElementById('sheetDesc').textContent = '';
  document.getElementById('sheetPoster').innerHTML = '<button class="sheet-close" onclick="closeSheet()">✕</button><div class="sheet-fallback">🎬</div>';

  try {
    const detail = await fetchDetail(vodId);
    sheetData = detail;

    const c = posterColor(detail.vod_name);
    const icon = posterIcon(detail.type_name || '');
    const pic = getPosterURL(detail);
    const proxyPic = pic && pic.startsWith('http') && !pic.includes('codetabs') && !pic.includes('tmdb') 
      ? CORS_PROXIES[0] + encodeURIComponent(pic) : '';
    const onerr = proxyPic
      ? "this.onerror=null;this.src='" + proxyPic + "'"
      : "this.style.display='none';this.nextElementSibling.style.display='flex'";
    if (pic) {
      document.getElementById('sheetPoster').innerHTML = '<button class="sheet-close" onclick="closeSheet()">✕</button><img src="'+pic+'" onerror="'+onerr+'"><div class="sheet-fallback" style="display:none;background:linear-gradient(135deg,'+c[0]+','+c[1]+')">'+icon+'</div>';
    } else {
      document.getElementById('sheetPoster').innerHTML = '<button class="sheet-close" onclick="closeSheet()">✕</button><div class="sheet-fallback" style="background:linear-gradient(135deg,'+c[0]+','+c[1]+')">'+icon+'</div>';
    }

    document.getElementById('sheetTitle').textContent = detail.vod_name;

    let metaHTML = '';
    if (detail.type_name) metaHTML += '<span class="tag type">'+escapeHTML(detail.type_name)+'</span>';
    if (detail.vod_year) metaHTML += '<span class="tag">'+escapeHTML(detail.vod_year)+'</span>';
    if (detail.vod_area) metaHTML += '<span class="tag">'+escapeHTML(detail.vod_area)+'</span>';
    if (detail.vod_remarks) metaHTML += '<span class="tag">'+escapeHTML(detail.vod_remarks)+'</span>';
    if (tmdbEnabled()) {
      const tmdb = tmdbCache[detail.vod_name];
      if (tmdb && tmdb.rating) metaHTML += '<span class="tag" style="color:var(--gold);background:rgba(249,202,36,0.1)">⭐ '+tmdb.rating+'</span>';
    }
    document.getElementById('sheetMeta').innerHTML = metaHTML || '<span class="tag">暂无信息</span>';

    let desc = detail.vod_blurb || detail.vod_content || '';
    if (!desc && tmdbEnabled()) {
      const tmdb = tmdbCache[detail.vod_name];
      if (tmdb && tmdb.overview) desc = tmdb.overview;
    }
    document.getElementById('sheetDesc').textContent = desc || '暂无简介';
    document.getElementById('sheetDesc').classList.remove('expanded');

    const isFaved = favorites.some(f => f.vod_id === detail.vod_id);
    const favBtn = document.getElementById('sheetFavBtn');
    favBtn.textContent = isFaved ? '❤️ 已收藏' : '🤍 收藏';
    favBtn.className = 'sheet-btn sheet-btn-fav' + (isFaved ? ' active' : '');
    favBtn.onclick = () => {
      toggleFavItem({vod_id: detail.vod_id, vod_name: detail.vod_name, vod_pic: detail.vod_pic, vod_remarks: detail.vod_remarks});
      const nowFaved = favorites.some(f => f.vod_id === detail.vod_id);
      favBtn.textContent = nowFaved ? '❤️ 已收藏' : '🤍 收藏';
      favBtn.className = 'sheet-btn sheet-btn-fav' + (nowFaved ? ' active' : '');
      renderMovieGrid();
    };

    document.getElementById('sheetPlayBtn').onclick = () => {
      closeSheet();
      playItem(detail.vod_id, detail.vod_name);
    };

  } catch(e) {
    document.getElementById('sheetDesc').textContent = '加载详情失败: ' + (e.message || '未知错误');
  }
}

  document.getElementById('sheetOverlay').classList.remove('show');
  sheetData = null;
}

// ============ HISTORY ============
function saveHistoryEntry(vodId, vodName, vodPic, sourceIdx, epIdx, epLabel, epUrl, currentTime, totalSources, totalEps, watchedEps) {
  let existing = history.find(h => h.vod_id === vodId);
  let allWatched = watchedEps || [];
  if (existing && existing.watched_eps) allWatched = existing.watched_eps.concat(allWatched).filter((v,i,a) => a.indexOf(v)===i);
  history = history.filter(h => h.vod_id !== vodId);
  history.unshift({ vod_id: vodId, vod_name: vodName, vod_pic: vodPic||'', source_idx: sourceIdx,
    ep_idx: epIdx, ep_label: epLabel, ep_url: epUrl, current_time: currentTime||0,
    total_sources: totalSources, total_eps: totalEps, watched_eps: allWatched, watched_at: Date.now() });
  if (history.length > 50) history = history.slice(0, 50);
  localStorage.setItem('zhuiju_history', JSON.stringify(history));
}

function saveCurrentProgress() {
  if (!currentPlayData || !playerVideo) return;
  const allSources = parsePlayUrls(currentPlayData.vod_play_url, currentPlayData.vod_play_from);
  const src = allSources[currentSourceIdx];
  if (!src || !src.eps[currentEpIdx]) return;
  const ep = src.eps[currentEpIdx];
  const t = playerVideo.currentTime || 0;
  let watchedEps = [currentEpIdx];
  const existing = history.find(h => h.vod_id === currentPlayData.vod_id);
  if (existing && existing.watched_eps) watchedEps = existing.watched_eps.concat(watchedEps).filter((v,i,a)=>a.indexOf(v)===i);
  saveHistoryEntry(currentPlayData.vod_id, currentPlayData.vod_name, currentPlayData.vod_pic,
    currentSourceIdx, currentEpIdx, ep.label, ep.url, t, allSources.length, src.eps.length, watchedEps);
}

function deleteHistoryEntry(vodId) { history = history.filter(h => h.vod_id !== vodId); localStorage.setItem('zhuiju_history', JSON.stringify(history)); renderHistory(); }

function clearHistory() {
  if (!history.length) return;
  if (!confirm('确定清空全部 '+history.length+' 条记录？')) return;
  history = []; localStorage.setItem('zhuiju_history', JSON.stringify(history)); renderHistory();
}

function formatTimeAgo(ts) {
  const diff = Date.now() - ts;
  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return Math.floor(diff/60000)+'分钟前';
  if (diff < 86400000) return Math.floor(diff/3600000)+'小时前';
  if (diff < 604800000) return Math.floor(diff/86400000)+'天前';
  const d = new Date(ts); return (d.getMonth()+1)+'/'+d.getDate();
}

function formatDuration(s) {
  if (!s || s<1) return '0:00';
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return m+':'+(sec<10?'0':'')+sec;
}

function renderHistory() {
  const grid = document.getElementById('historyGrid');
  const empty = document.getElementById('historyEmpty');
  if (history.length === 0) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  grid.innerHTML = history.map(h => {
    const progress = h.total_eps > 0 ? '第'+(h.ep_idx+1)+'/'+h.total_eps+'集' : h.ep_label;
    const name = escapeHTML(h.vod_name);
    const nameSafe = name.replace(/'/g,"\\'");
    return '<div class="movie-card" onclick="resumeFromHistory('+h.vod_id+','+h.source_idx+','+h.ep_idx+')">'+
      '<div class="card-poster">'+posterHTML(h)+
      '<div class="poster-gradient"></div>'+
      '<div class="poster-label">'+name+'</div>'+
      '<button class="card-fav" onclick="event.stopPropagation();deleteHistoryEntry('+h.vod_id+')" style="font-size:12px">✕</button>'+
      '</div>'+
      '<div class="card-body">'+
      '<div class="card-title">'+name+'</div>'+
      '<div class="card-tags">'+
      '<span class="tag hot">'+escapeHTML(progress)+'</span>'+
      (h.current_time>0?'<span class="tag">'+formatDuration(h.current_time)+'</span>':'')+
      '<span class="tag">'+formatTimeAgo(h.watched_at)+'</span>'+
      '</div></div></div>';
  }).join('');
}

async function resumeFromHistory(vodId, sourceIdx, epIdx) {
  const container = document.getElementById('playerContainer');
  container.innerHTML = '<div class="player-placeholder">⏳ 正在恢复播放...</div>';
  showPlayer();
  
  const safetyTimer = setTimeout(() => {
    if (!currentPlayData) {
      container.innerHTML = '<div class="player-placeholder">⚠️ 恢复超时<br><small>请检查网络后重试</small></div>';
    }
  }, 10000);

  try {
    const detail = await fetchDetail(vodId);
    clearTimeout(safetyTimer);
    if (!detail || !detail.vod_play_url) { container.innerHTML='<div class="player-placeholder">⚠️ 暂无播放资源</div>'; return; }
    currentPlayData = detail;
    document.getElementById('playerTitle').textContent = detail.vod_name;
    const allSources = parsePlayUrls(detail.vod_play_url, detail.vod_play_from);
    if (!allSources.length) { container.innerHTML='<div class="player-placeholder">⚠️ 无法解析播放地址</div>'; return; }
    currentSourceIdx = Math.min(sourceIdx, allSources.length-1);
    const src = allSources[currentSourceIdx];
    document.getElementById('sourceSelect').innerHTML = allSources.map((s,i)=>
      '<button class="source-btn'+(i===currentSourceIdx?' active':'')+'" onclick="switchSource('+i+')">'+escapeHTML(s.name)+'</button>'
    ).join('');
    currentEpIdx = Math.min(epIdx, src.eps.length-1);
    renderEpisodes(src, currentEpIdx);
    document.getElementById('playerPage').dataset.sources = JSON.stringify(allSources);
    playEpisode(src.eps[currentEpIdx].url, null, 0);
  } catch(e) { clearTimeout(safetyTimer); container.innerHTML='<div class="player-placeholder">⚠️ 恢复失败<br><small>'+(e.message||'')+'</small></div>'; }
}

// ============ PLAYER MODE SWITCH ============
let parseApiIdx = 0; // current parse API index

function switchPlayerMode(mode) {
  playerMode = mode;
  document.getElementById('btnModeDirect').classList.toggle('active', mode === 'direct');
  document.getElementById('btnModeProxy').classList.toggle('active', mode === 'proxy');
  if (currentPlayUrl) {
    playEpisode(currentPlayUrl, null, 0);
  }
}

function playWithMode(url) {
  currentPlayUrl = url;
  const container = document.getElementById('playerContainer');
  document.getElementById('playerModeToggle').style.display = 'flex';
  parseApiIdx = 0;

  if (playerMode === 'direct') {
    // Direct mode: try iframe with parse API
    playViaProxy(url, 0);
  } else {
    playViaProxy(url, 0);
  }
}

function playDirect(url, resumeTime) {
  const container = document.getElementById('playerContainer');
  cleanupPlayer();

  // In browser, direct HLS/m3u8 playback almost never works due to CORS
  // Just use parse API immediately
  playViaProxy(url, 0);
}

function playHLS(url, resumeTime) { playViaProxy(url, 0); }
function playNativeHLS(url, resumeTime) { playViaProxy(url, 0); }
function playNative(url, resumeTime) { playViaProxy(url, 0); }

function playViaProxy(url, startIdx) {
  const container = document.getElementById('playerContainer');
  cleanupPlayer();

  const idx = startIdx || 0;
  if (idx >= PARSE_APIS.length) {
    container.innerHTML = '<div class="player-placeholder">⚠️ 所有解析线路均不可用<br><small>请稍后再试或检查网络连接</small></div>';
    return;
  }

  container.innerHTML = '<div class="player-placeholder">⏳ 正在连接解析线路 '+(idx+1)+'/'+PARSE_APIS.length+'...</div>';

  const encodedUrl = encodeURIComponent(url);
  const iframe = document.createElement('iframe');
  iframe.setAttribute('allowfullscreen', 'true');
  iframe.setAttribute('allow', 'autoplay; encrypted-media; picture-in-picture');
  iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-presentation allow-popups');
  iframe.style.cssText = 'width:100%;height:100%;border:none;position:absolute;inset:0;background:#000;';

  // CRITICAL: append iframe to DOM FIRST, then set src
  // Setting src before DOM insertion causes load issues on mobile browsers
  container.innerHTML = '';
  container.appendChild(iframe);

  // Auto-switch to next parse API if this one doesn't load in 8 seconds
  let switched = false;
  const switchTimer = setTimeout(() => {
    if (!switched) {
      switched = true;
      if (idx + 1 < PARSE_APIS.length) {
        playViaProxy(url, idx + 1);
      } else {
        // All failed, try direct video playback as last resort
        tryDirectVideo(url);
      }
    }
  }, 8000);

  iframe.addEventListener('load', () => {
    if (switched) return;
    clearTimeout(switchTimer);
    switched = true;
    parseApiIdx = idx;
    const label = document.getElementById('currentParseLabel');
    if (label) label.textContent = '解析' + (idx + 1);
  });

  iframe.addEventListener('error', () => {
    if (switched) return;
    clearTimeout(switchTimer);
    switched = true;
    if (idx + 1 < PARSE_APIS.length) {
      playViaProxy(url, idx + 1);
    } else {
      tryDirectVideo(url);
    }
  });

  // NOW set src - after iframe is in DOM
  iframe.src = PARSE_APIS[idx] + encodedUrl;
}

// Last resort: try direct video tag (works for mp4, not m3u8)
function tryDirectVideo(url) {
  const container = document.getElementById('playerContainer');
  cleanupPlayer();
  const video = document.createElement('video');
  video.controls = true;
  video.autoplay = true;
  video.playsInline = true;
  video.setAttribute('webkit-playsinline', 'true');
  video.setAttribute('x5-video-player-type', 'h5');
  video.style.cssText = 'width:100%;height:100%;max-height:100%;object-fit:contain;';
  video.src = url;
  container.appendChild(video);
  playerVideo = video;
  
  video.addEventListener('error', () => {
    container.innerHTML = '<div class="player-placeholder">⚠️ 所有播放方式均失败<br><small>请尝试切换线路或稍后重试</small></div>';
  });
  
  video.addEventListener('loadeddata', () => {
    parseApiIdx = PARSE_APIS.length;
    const label = document.getElementById('currentParseLabel');
    if (label) label.textContent = '直连';
  });
  
  video.play().catch(() => {});
}

function cleanupPlayer() {
  if (playerHls) { try { playerHls.destroy(); } catch(e) {} playerHls = null; }
  if (playerVideo) { try { playerVideo.pause(); playerVideo.remove(); } catch(e) {} playerVideo = null; }
  document.getElementById('playerContainer').innerHTML = '';
}

async function playItem(vodId, vodName) {
  document.getElementById('playerContainer').innerHTML = '<div class="player-placeholder">⏳ 获取播放地址...</div>';
  document.getElementById('playerTitle').textContent = vodName;
  showPlayer();
  
  // Set a safety timeout - if detail fetch takes >20s, show error with retry button
  const safetyTimer = setTimeout(() => {
    if (!currentPlayData) {
      document.getElementById('playerContainer').innerHTML = 
        '<div class="player-placeholder">⚠️ 获取超时<br><small>网络较慢，请重试</small><br><button onclick="playItem('+vodId+',\''+vodName.replace(/'/g,"\\'")+'\')" style="margin-top:12px;padding:8px 20px;border-radius:20px;border:none;background:var(--purple);color:#fff;font-size:12px;cursor:pointer;">🔄 重试</button></div>';
    }
  }, 20000);

  try {
    const detail = await fetchDetail(vodId);
    clearTimeout(safetyTimer);
    if (!detail || !detail.vod_play_url) { document.getElementById('playerContainer').innerHTML='<div class="player-placeholder">⚠️ 暂无播放资源</div>'; return; }
    currentPlayData = detail;
    openPlayer(detail);
  } catch(e) {
    clearTimeout(safetyTimer);
    document.getElementById('playerContainer').innerHTML=
      '<div class="player-placeholder">⚠️ 获取失败<br><small>'+(e.message||'网络错误')+'</small><br><button onclick="playItem('+vodId+',\''+vodName.replace(/'/g,"\\'")+'\')" style="margin-top:12px;padding:8px 20px;border-radius:20px;border:none;background:var(--purple);color:#fff;font-size:12px;cursor:pointer;">🔄 重试</button></div>';
  }
}

function openPlayer(item) {
  showPlayer();
  document.getElementById('playerTitle').textContent = item.vod_name;
  const allSources = parsePlayUrls(item.vod_play_url, item.vod_play_from);
  if (!allSources.length) { document.getElementById('playerContainer').innerHTML='<div class="player-placeholder">⚠️ 无法解析播放地址</div>'; return; }
  document.getElementById('sourceSelect').innerHTML = allSources.map((s,i)=>
    '<button class="source-btn'+(i===0?' active':'')+'" onclick="switchSource('+i+')">'+escapeHTML(s.name)+'</button>'
  ).join('');
  currentSourceIdx = 0; currentEpIdx = 0;
  renderEpisodes(allSources[0], 0);
  playEpisode(allSources[0].eps[0].url);
  document.getElementById('playerPage').dataset.sources = JSON.stringify(allSources);
  startProgressSaver();
}

function switchSource(idx) {
  currentSourceIdx = idx; currentEpIdx = 0;
  const allSources = JSON.parse(document.getElementById('playerPage').dataset.sources);
  document.querySelectorAll('.source-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  renderEpisodes(allSources[idx], 0);
  if (allSources[idx].eps.length) playEpisode(allSources[idx].eps[0].url);
  showEpisodes();
}

function renderEpisodes(source, activeIdx) {
  let watchedEps = [];
  if (currentPlayData) { const h = history.find(x => x.vod_id === currentPlayData.vod_id); if (h) watchedEps = h.watched_eps || []; }
  const bar = document.getElementById('episodeBar');
  bar.innerHTML = source.eps.map((ep,i) => {
    let cls = 'episode-btn';
    if (i === activeIdx) cls += ' active';
    if (watchedEps.indexOf(i) >= 0) cls += ' watched';
    return '<button class="'+cls+'" onclick="playEpisode(\''+ep.url.replace(/'/g,"\\'")+'\',this)">'+escapeHTML(ep.label)+'</button>';
  }).join('');
  showEpisodes();
  setTimeout(() => { const btn = bar.querySelector('.episode-btn.active'); if(btn) btn.scrollIntoView({behavior:'smooth',block:'nearest'}); }, 100);
}

function playEpisode(url, btnEl, resumeTime) {
  if (btnEl) {
    document.querySelectorAll('.episode-btn').forEach((b,i) => { b.classList.remove('active'); if(b===btnEl) currentEpIdx=i; });
    btnEl.classList.add('active');
    showEpisodes();
  }

  playerMode = 'direct';
  document.getElementById('btnModeDirect').classList.add('active');
  document.getElementById('btnModeProxy').classList.remove('active');
  document.getElementById('playerModeToggle').style.display = 'flex';

  cleanupPlayer();
  currentPlayUrl = url;
  parseApiIdx = 0;
  // Always use parse API - direct HLS won't work in browser due to CORS
  playViaProxy(url, 0);
}

function closePlayer() {
  stopProgressSaver();
  saveCurrentProgress();
  cleanupPlayer();
  document.getElementById('playerPage').classList.remove('show');
  document.querySelector('.bottom-nav').style.display = 'flex';
  document.querySelector('.header').style.display = 'block';
  document.body.style.overflow = '';
  document.getElementById('playerContainer').innerHTML = '<div class="player-placeholder">🎬 正在加载播放器...</div>';
  document.getElementById('playerModeToggle').style.display = 'none';
  currentPlayData = null;
  currentPlayUrl = '';
}

function switchParseLine() {
  if (!currentPlayUrl) return;
  parseApiIdx = (parseApiIdx + 1) % PARSE_APIS.length;
  document.getElementById('currentParseLabel').textContent = '解析' + (parseApiIdx + 1);
  playViaProxy(currentPlayUrl, parseApiIdx);
}

function startProgressSaver() { stopProgressSaver(); historySaveTimer = setInterval(() => { if(playerVideo&&currentPlayData) saveCurrentProgress(); }, 10000); }
function stopProgressSaver() { if(historySaveTimer){clearInterval(historySaveTimer);historySaveTimer=null;} }

// ============ PAGES ============
function switchPage(page) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const target = document.getElementById('page-'+page);
  if (target) target.classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navs = {watch:0, search:1, favorites:2, history:3};
  if (navs[page] !== undefined) document.querySelectorAll('.nav-item')[navs[page]].classList.add('active');
  if (page === 'favorites') renderFavorites();
  if (page === 'history') renderHistory();
}

// ============ SEARCH ============
async function doSearch() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) return;
  switchPage('search');
  document.getElementById('searchQuery').textContent = query;
  document.getElementById('searchResults').innerHTML = renderSkeletons(6);
  document.getElementById('searchStatus').textContent = '';
  try {
    const result = await apiCall({ wd: query });
    document.getElementById('searchResults').innerHTML = result.list.length > 0
      ? result.list.map(renderMovieCard).join('')
      : '<div class="empty-state"><div class="icon">🔍</div><p>没有找到相关影片<br>试试其他关键词</p></div>';
  } catch(e) {
    document.getElementById('searchResults').innerHTML = '';
    document.getElementById('searchStatus').textContent = '搜索失败: '+(e.message||'未知错误');
    document.getElementById('searchStatus').classList.add('error');
  }
}

// ============ PULL REFRESH ============
let pullStartY = 0, pulling = false;
document.addEventListener('touchstart', e => {
  if (window.scrollY === 0 && currentPage === 'watch') pullStartY = e.touches[0].clientY;
}, {passive: true});
document.addEventListener('touchmove', e => {
  if (pullStartY && window.scrollY === 0 && currentPage === 'watch') {
    const dy = e.touches[0].clientY - pullStartY;
    if (dy > 60 && !pulling) { pulling = true; refreshData(); }
  }
}, {passive: true});
document.addEventListener('touchend', () => { pullStartY = 0; pulling = false; });

async function refreshData() {
  const indicator = document.getElementById('pullIndicator');
  indicator.innerHTML = '<span class="pull-spinner"></span>正在刷新...';
  indicator.classList.add('show');
  try {
    allMovies = await loadAllData();
    setCache(allMovies);
    renderBanner(allMovies.slice(0, 6));
    renderMovieGrid();
    updateStats();
    if (tmdbEnabled()) { batchTMDB(allMovies).then(() => reRenderAll()); }
    indicator.innerHTML = '✅ 更新完成';
    setTimeout(() => indicator.classList.remove('show'), 2000);
  } catch(e) {
    indicator.innerHTML = '⚠️ 刷新失败，请检查网络';
    setTimeout(() => indicator.classList.remove('show'), 2000);
  }
}

function reRenderAll() {
  renderBanner(allMovies.slice(0, 6));
  renderMovieGrid();
  if (currentPage === 'favorites') renderFavorites();
  if (currentPage === 'history') renderHistory();
}

// ============ TOAST ============
function showToast(msg) {
  const t = document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2200);
}

// ============ STATS ============
function updateStats() {
  document.getElementById('updateCount').textContent = allMovies.length + ' 部资源';
}

// ============ INIT ============
async function init() {
  document.getElementById('movieGrid').innerHTML = renderSkeletons(8);

  const cache = getCache();
  if (cache && cache.data.length > 0) {
    allMovies = cache.data;
    renderBanner(allMovies.slice(0, 6));
    renderCategoryBar();
    renderMovieGrid();
    updateStats();
  }

  try {
    allMovies = await loadAllData();
    setCache(allMovies);
    renderBanner(allMovies.slice(0, 6));
    renderCategoryBar();
    renderMovieGrid();
    updateStats();

    if (tmdbEnabled()) {
      batchTMDB(allMovies).then(() => reRenderAll());
    }
  } catch(e) {
    if (allMovies.length === 0) {
      document.getElementById('movieGrid').innerHTML = '<div class="status-bar error">加载失败<br><small>'+(e.message||'网络错误')+'</small></div>';
    }
  }

  renderFavorites();
  renderHistory();
  setTimeout(checkUpdate, 3000);
}

// ============ CLOUD UPDATE ============
async function checkUpdate() {
  if (!UPDATE_URL) return;
  try {
    const verUrl = UPDATE_URL + 'version.json';
    const resp = await fetch(verUrl+'?t='+Date.now(), {signal: AbortSignal.timeout(8000)});
    if (!resp.ok) return;
    const remote = await resp.json();
    if (remote.version > APP_VERSION) showUpdateBanner(remote);
  } catch(e) {}
}

function showUpdateBanner(remote) {
  if (document.getElementById('updateBanner')) return;
  const banner = document.createElement('div');
  banner.id = 'updateBanner';
  banner.style.cssText = 'position:fixed;bottom:70px;left:12px;right:12px;z-index:500;background:linear-gradient(135deg,#6c5ce7,#ff6b9d);color:#fff;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(108,92,231,0.5);animation:slideUp 0.3s ease;font-size:12px;';
  banner.innerHTML = '<div style="flex:1"><div style="font-weight:700;margin-bottom:2px">🎉 发现新版本 v'+remote.version+'</div><div style="font-size:10px;opacity:0.85">'+escapeHTML(remote.note||'')+' · '+escapeHTML(remote.updated||'')+'</div></div>'+
    '<button onclick="doUpdate()" style="flex-shrink:0;height:28px;padding:0 14px;border-radius:14px;border:none;background:#fff;color:#6c5ce7;font-size:11px;font-weight:700;cursor:pointer;">立即更新</button>'+
    '<button onclick="this.parentElement.remove()" style="flex-shrink:0;width:22px;height:22px;border-radius:50%;border:none;background:rgba(255,255,255,0.2);color:#fff;font-size:11px;cursor:pointer;">✕</button>';
  document.body.appendChild(banner);
}

async function doUpdate() {
  const banner = document.getElementById('updateBanner');
  if (banner) banner.innerHTML = '<div style="text-align:center;width:100%;padding:6px">⏳ 正在更新...</div>';
  try {
    const resp = await fetch(UPDATE_URL+'?t='+Date.now(), {signal:AbortSignal.timeout(15000)});
    if (!resp.ok) throw new Error('下载失败');
    const newHTML = await resp.text();
    if (newHTML.indexOf('<!DOCTYPE html>')<0 && newHTML.indexOf('<html')<0) throw new Error('格式异常');
    document.open(); document.write(newHTML); document.close();
  } catch(e) {
    if (banner) banner.innerHTML = '<div style="text-align:center;width:100%;padding:6px;color:#ffcccb">⚠️ 更新失败: '+escapeHTML(e.message||'')+'</div>';
  }
}

const updateCSS = document.createElement('style');
updateCSS.textContent = '@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}';
document.head.appendChild(updateCSS);

init();
</script>
</body>
